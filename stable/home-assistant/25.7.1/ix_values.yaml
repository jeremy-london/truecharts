cnpg:
  main:
    database: home-assistant
    enabled: true
    user: home-assistant
configmap:
  init:
    data:
      configuration.yaml.default: "# Configure a default setup of Home Assistant (frontend,\
        \ api, etc)\ndefault_config:\n\n# Text to speech\ntts:\n  - platform: google_translate\n\
        \ngroup: !include groups.yaml\nautomation: !include automations.yaml\nscript:\
        \ !include scripts.yaml\nscene: !include scenes.yaml"
      http.default: "http:\n  use_x_forwarded_for: true\n  trusted_proxies:\n    {{-\
        \ if hasKey .Values \"ixChartContext\" }}\n    - {{ .Values.ixChartContext.kubernetes_config.cluster_cidr\
        \ }}\n    {{- else }}\n      {{- range .Values.homeassistant.trusted_proxies\
        \ }}\n    - {{ . }}\n      {{- end }}\n    {{- end }}"
      init.sh: "#!/bin/sh\n{{- $haDBURL := (printf \"%s?client_encoding=utf8\" ($.Values.cnpg.main.creds.std\
        \ | trimAll \"\\\"\")) }}\nconfig=\"/config/configuration.yaml\"\ndefault=\"\
        /config/init\"\nif [ ! -f \"$config\" ]; then\n  echo \"File [$config] does\
        \ NOT exist. Creating...\"\n  cp \"$default/configuration.yaml.default\" \"\
        $config\"\nfi\nif ! grep -q \"recorder:\" \"$config\"; then\n  echo \"Section\
        \ [recorder] does NOT exist in [$config]. Appending...\"\n  echo \"\" >> \"\
        $config\"\n  cat \"$default/recorder.default\" >> \"$config\"\nfi\nif ! grep\
        \ -q \"http:\" \"$config\"; then\n  echo \"Section [http] does NOT exist in\
        \ [$config]. Appending...\"\n  echo \"\" >> \"$config\"\n  cat \"$default/http.default\"\
        \ >> \"$config\"\nfi\n\necho \"Updating database URL\"\nyq -i '.recorder.db_url\
        \ = \"{{ $haDBURL }}\"' \"$config\"\necho \"Done\"\n\necho \"Creating include\
        \ files...\"\nfor include_file in groups.yaml automations.yaml scripts.yaml\
        \ scenes.yaml; do\n  if [ ! -f \"/config/$include_file\" ]; then\n    echo\
        \ \"File [$include_file] missing. Creating\"\n    touch \"/config/$include_file\"\
        \n  fi\ndone\n\ncd \"/config\" || echo \"Could not change path to /config\"\
        \necho \"Creating custom_components directory...\"\nmkdir -p \"/config/custom_components\"\
        \ || echo \"custom_components directory already exists\"\n\necho \"Changing\
        \ to the custom_components directory...\"\ncd \"/config/custom_components\"\
        \ || echo \"Could not change path to /config/custom_components\"\n\necho \"\
        Downloading HACS\"\nwget \"https://github.com/hacs/integration/releases/latest/download/hacs.zip\"\
        \ || exit 0\n\nif [ -d \"/config/custom_components/hacs\" ]; then\n  echo\
        \ \"HACS directory already exist, cleaning up...\"\n  rm -R \"/config/custom_components/hacs\"\
        \nfi\n\necho \"Creating HACS directory...\"\nmkdir -p \"/config/custom_components/hacs\"\
        \n\necho \"Unpacking HACS...\"\nunzip \"/config/custom_components/hacs.zip\"\
        \ -d \"/config/custom_components/hacs\" >/dev/null 2>&1\n\necho \"Removing\
        \ HACS zip file...\"\nrm \"/config/custom_components/hacs.zip\"\necho \"Installation\
        \ complete.\""
      recorder.default: "recorder:\n  purge_keep_days: 30\n  commit_interval: 3\n\
        \  db_url: {{ (printf \"%s?client_encoding=utf8\" (.Values.cnpg.main.creds.std\
        \ | trimAll \"\\\"\")) | quote }}"
    enabled: true
homeassistant:
  trusted_proxies: []
image:
  pullPolicy: IfNotPresent
  repository: docker.io/homeassistant/home-assistant
  tag: "2026.3"
persistence:
  config:
    enabled: true
    mountPath: /config
    targetSelectAll: true
  init:
    defaultMode: '0777'
    enabled: true
    mountPath: /config/init
    objectName: init
    readOnly: true
    targetSelector:
      main:
        init: {}
    type: configmap
portal:
  open:
    enabled: true
prometheus:
  serviceMonitor:
    enabled: false
securityContext:
  container:
    capabilities:
      add:
      - CAP_NET_RAW
      - CAP_NET_BIND_SERVICE
    readOnlyRootFilesystem: false
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0
service:
  main:
    ports:
      main:
        port: 8123
        targetPort: 8123
workload:
  main:
    podSpec:
      initContainers:
        init:
          command: /config/init/init.sh
          enabled: true
          imageSelector: yqImage
          type: init
