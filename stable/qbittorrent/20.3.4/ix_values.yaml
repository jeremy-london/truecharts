image:
  pullPolicy: IfNotPresent
  repository: oci.trueforge.org/containerforge/qbittorrent
  tag: 5.1.4@sha256:6a7ffbfff04dd109bff37c474bfee00aa08dea5edb78c670439be3ed242b70fa
persistence:
  config:
    enabled: true
    mountPath: /config
qbitportforward:
  QBT_PASSWORD: adminadmin
  QBT_USERNAME: admin
  enabled: false
qbitportforwardImage:
  pullPolicy: IfNotPresent
  repository: docker.io/mjmeli/qbittorrent-port-forward-gluetun-server
  tag: latest
securityContext:
  container:
    readOnlyRootFilesystem: false
service:
  gluetun:
    enabled: true
    ports:
      gluetun:
        enabled: true
        port: 8000
        protocol: http
        targetPort: 8000
    type: ClusterIP
  main:
    ports:
      main:
        port: 10095
  torrent:
    enabled: true
    ports:
      torrent:
        enabled: true
        port: 6881
        protocol: tcp
      torrentudp:
        enabled: true
        port: '{{ .Values.service.torrent.ports.torrent.port }}'
        protocol: udp
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            QBT_TORRENTING_PORT: '{{ .Values.service.torrent.ports.torrent.port }}'
            QBT_WEBUI_PORT: '{{ .Values.service.main.ports.main.port }}'
  qbitportforward:
    enabled: true
    podSpec:
      containers:
        qbitportforward:
          command: /usr/src/app/main.sh
          enabled: true
          env:
            GTN_ADDR: '{{ printf "http://%v-gluetun" (include "tc.v1.common.lib.chart.names.fullname"
              $) }}'
            QBT_ADDR: '{{ printf "http://%v:%v" (include "tc.v1.common.lib.chart.names.fullname"
              $) .Values.service.main.ports.main.port }}'
            QBT_PASSWORD: '{{ .Values.qbitportforward.QBT_PASSWORD }}'
            QBT_USERNAME: '{{ .Values.qbitportforward.QBT_USERNAME }}'
          imageSelector: qbitportforwardImage
          primary: true
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
      restartPolicy: OnFailure
    schedule: '*/5 * * * *'
    type: CronJob
