image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/onedr0p/qbittorrent
  tag: 5.1.4@sha256:3ee43a4d08ce4a0108e4c8150f570544a8c4a4a11e2ca95b86d46006547f80d5
persistence:
  config:
    enabled: true
    mountPath: /config
portal:
  open:
    enabled: true
qbitportforward:
  QBT_PASSWORD: adminadmin
  QBT_USERNAME: admin
  enabled: false
qbitportforwardImage:
  pullPolicy: IfNotPresent
  repository: docker.io/mjmeli/qbittorrent-port-forward-gluetun-server
  tag: latest@sha256:67d0d21ed792cf80716d4211e7162b6d375af5c12f3cf096c9032ad705dddaa8
securityContext:
  container:
    readOnlyRootFilesystem: false
service:
  gluetun:
    enabled: true
    ports:
      gluetun:
        enabled: true
        port: 8000
        protocol: http
        targetPort: 8000
    type: ClusterIP
  main:
    ports:
      main:
        port: 10095
  torrent:
    enabled: true
    ports:
      torrent:
        enabled: true
        port: 6881
        protocol: tcp
      torrentudp:
        enabled: true
        port: '{{ .Values.service.torrent.ports.torrent.port }}'
        protocol: udp
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            QBT_TORRENTING_PORT: '{{ .Values.service.torrent.ports.torrent.port }}'
            QBT_WEBUI_PORT: '{{ .Values.service.main.ports.main.port }}'
  qbitportforward:
    enabled: true
    podSpec:
      containers:
        qbitportforward:
          command: /usr/src/app/main.sh
          enabled: true
          env:
            GTN_ADDR: '{{ printf "http://%v-gluetun:8000" (include "tc.v1.common.lib.chart.names.fullname"
              $) }}'
            QBT_ADDR: '{{ printf "http://%v:%v" (include "tc.v1.common.lib.chart.names.fullname"
              $) .Values.service.main.ports.main.port }}'
            QBT_PASSWORD: '{{ .Values.qbitportforward.QBT_PASSWORD }}'
            QBT_USERNAME: '{{ .Values.qbitportforward.QBT_USERNAME }}'
          imageSelector: qbitportforwardImage
          primary: true
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
      restartPolicy: OnFailure
    schedule: '*/5 * * * *'
    type: CronJob
