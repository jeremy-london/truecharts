image:
  pullPolicy: IfNotPresent
  repository: docker.io/linuxserver/nzbget
  tag: "26.0.20260306"
persistence:
  config:
    enabled: true
    mountPath: /config
portal:
  open:
    enabled: true
service:
  main:
    ports:
      main:
        port: 10057
        targetPort: 6789
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
