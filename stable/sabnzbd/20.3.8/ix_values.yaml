exportarrImage:
  pullPolicy: IfNotPresent
  repository: ghcr.io/onedr0p/exportarr
  tag: v2.0.1@sha256:727e7bc8f2f0934a2117978c59f4476b954018b849a010ea6cfb380bd6539644
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/home-operations/sabnzbd
  tag: 4.5.5@sha256:9b6662d5871518346655bfd3acb4c94e11f31c79c103ef04154558dab927c852
metrics:
  main:
    apiKey: ''
    enabled: false
    endpoints:
    - path: /metrics
      port: metrics
    targetSelector: metrics
    type: servicemonitor
persistence:
  config:
    enabled: true
    targetSelector:
      exportarr:
        exportarr:
          mountPath: /config
          readOnly: true
      main:
        main:
          mountPath: /config
portal:
  open:
    enabled: true
service:
  main:
    ports:
      main:
        port: 10097
  metrics:
    enabled: true
    ports:
      metrics:
        enabled: true
        port: 8990
        targetSelector: exportarr
    targetSelector: exportarr
    type: ClusterIP
workload:
  exportarr:
    enabled: '{{ .Values.metrics.main.enabled }}'
    podSpec:
      containers:
        exportarr:
          args:
          - sabnzbd
          enabled: true
          env:
            APIKEY: '{{ .Values.metrics.main.apiKey }}'
            INTERFACE: 0.0.0.0
            PORT: '{{ .Values.service.metrics.ports.metrics.port }}'
            URL: '{{ printf "http://%v:%v" (include "tc.v1.common.lib.chart.names.fullname"
              $) .Values.service.main.ports.main.port }}'
          imageSelector: exportarrImage
          primary: true
          probes:
            liveness:
              enabled: true
              path: /healthz
              port: '{{ .Values.service.metrics.ports.metrics.port }}'
              type: http
            readiness:
              enabled: true
              path: /healthz
              port: '{{ .Values.service.metrics.ports.metrics.port }}'
              type: http
            startup:
              enabled: true
              path: /healthz
              port: '{{ .Values.service.metrics.ports.metrics.port }}'
              type: http
    replicas: 1
    strategy: RollingUpdate
    type: Deployment
  main:
    podSpec:
      containers:
        main:
          env:
            SABNZBD__HOST_WHITELIST_ENTRIES: ''
            SABNZBD__PORT: '{{ .Values.service.main.ports.main.port }}'
