service:
  main:
    ports:
      main:
        forwardedHeaders:
          enabled: false
        port: 9000
        protocol: http
        proxyProtocol:
          enabled: false
        targetPort: 9000
  metrics:
    enabled: true
    ports:
      metrics:
        enabled: true
        forwardedHeaders:
          enabled: false
        port: 9180
        protocol: http
        proxyProtocol:
          enabled: false
        targetPort: 9180
    type: ClusterIP
  tcp:
    enabled: true
    externalTrafficPolicy: Local
    ports:
      web:
        enabled: true
        forwardedHeaders:
          enabled: false
          insecureMode: false
          trustedIPs: []
        port: 80
        protocol: http
        proxyProtocol:
          enabled: false
          insecureMode: false
          trustedIPs: []
        redirectTo: websecure
      websecure:
        enabled: true
        forwardedHeaders:
          enabled: false
          insecureMode: false
          trustedIPs: []
        port: 443
        protocol: https
        proxyProtocol:
          enabled: false
          insecureMode: false
          trustedIPs: []
    type: LoadBalancer
serviceAccount:
  main:
    enabled: true
    primary: true
tlsOptions:
  default:
    cipherSuites:
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_AES_128_GCM_SHA256
    - TLS_AES_256_GCM_SHA384
    - TLS_CHACHA20_POLY1305_SHA256
    curvePreferences:
    - CurveP521
    - CurveP384
    - X25519
    minVersion: VersionTLS12
    sniStrict: false
tlsStore: {}
workload:
  main:
    podSpec:
      containers:
        main:
          args: []
          probes:
            liveness:
              type: http
            readiness:
              type: http
            startup:
              type: http
    replicas: 2
    strategy: RollingUpdate
