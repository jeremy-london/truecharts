additionalArguments:
- --serverstransport.insecureskipverify=true
- --providers.kubernetesingress.allowexternalnameservices=true
configmap:
  dashboard:
    data:
      traefik.json: '{{ .Files.Get "dashboard.json" | indent 8 }}'
    enabled: true
    labels:
      grafana_dashboard: '1'
defaultCertificate: ''
globalArguments:
- --global.checknewversion
image:
  pullPolicy: IfNotPresent
  repository: traefik
  tag: v3.6.10
ingress:
  main:
    integrations:
      homepage:
        href: https://{{  ( index .Values.ingress.main.hosts 0 ).host  }}/dashboard/
ingressClass:
  enabled: false
  fallbackApiVersion: ''
  isDefaultClass: false
ingressRoute:
  dashboard:
    annotations: {}
    enabled: true
    labels: {}
logs:
  access:
    enabled: false
    fields:
      general:
        defaultmode: keep
        names: {}
      headers:
        defaultmode: drop
        names: {}
    filters: {}
    format: common
  general:
    format: common
    level: ERROR
metrics:
  main:
    enabled: true
    endpoints:
    - path: /metrics
      port: metrics
    targetSelector: metrics
    type: servicemonitor
middlewares:
  addPrefix: []
  basicAuth: []
  bouncer: []
  buffering: []
  chain: []
  corsHeaders: []
  customFrameOptionsValue: []
  customRequestHeaders: []
  customResponseHeaders: []
  forwardAuth: []
  geoBlock: []
  ipWhiteList: []
  modsecurity: []
  rateLimit: []
  realIP: []
  redirectRegex: []
  redirectScheme: []
  rewriteResponseHeaders: []
  stripPrefixRegex: []
  themePark: []
operator:
  register: true
persistence:
  crowdsec-bouncer-tls:
    enabled: '{{ if .Values.middlewares.bouncer }}true{{ else }}false{{ end }}'
    expandObjectName: false
    mountPath: /etc/traefik/crowdsec-certs
    objectName: crowdsec-bouncer-tls
    type: secret
  plugins:
    enabled: true
    mountPath: /plugins-storage
    type: emptyDir
podOptions:
  automountServiceAccountToken: true
portal:
  open:
    enabled: true
    path: /dashboard/
portalhook:
  enabled: true
providers:
  kubernetesCRD:
    enabled: true
    namespaces: []
  kubernetesIngress:
    enabled: true
    namespaces: []
    publishedService:
      enabled: true
rbac:
  main:
    clusterWide: true
    enabled: true
    primary: true
    rules:
    - apiGroups:
      - ''
      resources:
      - nodes
      verbs:
      - get
      - list
      - watch
    - apiGroups:
      - ''
      resources:
      - endpoints
      - services
      verbs:
      - get
      - list
      - watch
    - apiGroups:
